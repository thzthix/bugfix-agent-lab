name: Run bugfix harness for GitHub issues

on:
  issues:
    types:
      - opened
      - reopened

permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: issue-bugfix-${{ github.event.issue.number }}
  cancel-in-progress: true

jobs:
  bugfix:
    runs-on: ubuntu-latest
    env:
      OUTPUT_DIR: /tmp/harness-output
      ISSUE_FILE: /tmp/harness-issue.txt
      STDOUT_FILE: /tmp/harness-stdout.txt
      STDERR_FILE: /tmp/harness-stderr.txt
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: python -m pip install google-genai python-dotenv

      - name: Write issue text
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          event = json.loads(Path(os.environ["GITHUB_EVENT_PATH"]).read_text(encoding="utf-8"))
          issue = event["issue"]
          title = issue.get("title", "").strip()
          body = (issue.get("body") or "").strip()
          text = title if not body else f"{title}\n\n{body}"
          Path(os.environ["ISSUE_FILE"]).write_text(text, encoding="utf-8")
          PY

      - name: Run harness
        id: harness
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PYTHONPATH: .
        run: |
          set +e
          python -m harness.gemini_main \
            --repo-root . \
            --issue-file "$ISSUE_FILE" \
            --output-dir "$OUTPUT_DIR" \
            > "$STDOUT_FILE" 2> "$STDERR_FILE"
          exit_code=$?
          echo "exit_code=$exit_code" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Read harness result
        id: result
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          def extract_failure_reason(text: str) -> str:
              lines = [line.strip() for line in text.splitlines() if line.strip()]
              if not lines:
                  return "Harness did not produce a result."
              for line in reversed(lines):
                  lowered = line.lower()
                  if "resource_exhausted" in lowered or "quota exceeded" in lowered:
                      return "Gemini API quota was exceeded before the fix flow could complete."
                  if "assertionerror" in lowered or "traceback" in lowered:
                      return line
                  if "error" in lowered or "exception" in lowered:
                      return line
              return lines[-1]

          def build_log_excerpt(text: str, limit: int = 12) -> str:
              lines = [line.rstrip() for line in text.splitlines() if line.strip()]
              if not lines:
                  return ""
              return "\n".join(lines[-limit:])

          def suggest_next_action(text: str) -> str:
              lowered = text.lower()
              if "resource_exhausted" in lowered or "quota exceeded" in lowered:
                  return "Wait for the Gemini free-tier retry window or raise the API quota/billing limit, then rerun the issue."
              if "gemini_api_key" in lowered:
                  return "Check the GEMINI_API_KEY repository secret and rerun the issue."
              return "Review the workflow artifact logs, then retry the issue after updating the harness or environment."

          output_path = Path(os.environ["OUTPUT_DIR"])
          result_path = output_path / "result.json"
          stdout_path = Path(os.environ["STDOUT_FILE"])
          stderr_path = Path(os.environ["STDERR_FILE"])
          github_output = Path(os.environ["GITHUB_OUTPUT"])

          has_result = result_path.exists()
          success = False
          summary = ""
          report_excerpt = ""
          next_action = ""
          modified_files = ""

          if has_result:
              payload = json.loads(result_path.read_text(encoding="utf-8"))
              success = bool(payload.get("success", False))
              summary = str(payload.get("summary", "")).strip()
              report_text = str(payload.get("report_markdown", "")).strip()
              report_excerpt = "\n".join(report_text.splitlines()[:12]).strip()
              files = payload.get("modified_files", [])
              if isinstance(files, list):
                  modified_files = "\n".join(
                      f"- {str(path)}" for path in files if str(path).strip()
                  )

          stderr_text = stderr_path.read_text(encoding="utf-8").strip() if stderr_path.exists() else ""
          stdout_text = stdout_path.read_text(encoding="utf-8").strip() if stdout_path.exists() else ""
          combined_output = stderr_text or stdout_text

          if not summary:
              summary = extract_failure_reason(combined_output)
          if not report_excerpt:
              report_excerpt = build_log_excerpt(combined_output)
          next_action = suggest_next_action(combined_output)

          with github_output.open("a", encoding="utf-8") as fh:
              fh.write(f"has_result={'true' if has_result else 'false'}\n")
              fh.write(f"success={'true' if success else 'false'}\n")
              fh.write("summary<<EOF\n")
              fh.write(summary + "\n")
              fh.write("EOF\n")
              fh.write("report_excerpt<<EOF\n")
              fh.write(report_excerpt + "\n")
              fh.write("EOF\n")
              fh.write("next_action<<EOF\n")
              fh.write(next_action + "\n")
              fh.write("EOF\n")
              fh.write("modified_files<<EOF\n")
              fh.write(modified_files + "\n")
              fh.write("EOF\n")
          PY

      - name: Upload harness artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: issue-${{ github.event.issue.number }}-harness-output
          path: |
            /tmp/harness-output
            /tmp/harness-stdout.txt
            /tmp/harness-stderr.txt
            /tmp/harness-issue.txt
          if-no-files-found: warn

      - name: Create fix pull request
        id: cpr
        if: steps.result.outputs.success == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "feat: 이슈 #${{ github.event.issue.number }} 자동 수정 결과 추가"
          branch: automation/issue-${{ github.event.issue.number }}-bugfix
          delete-branch: true
          title: "fix: resolve issue #${{ github.event.issue.number }}"
          body: |
            Closes #${{ github.event.issue.number }}

            ## 변경 목적 (Why)

            - GitHub issue #${{ github.event.issue.number }}에서 보고된 버그를 자동 수정하기 위해
            - 하네스 실행 결과 요약: ${{ steps.result.outputs.summary }}

            ## 변경 내용 (What)

            - 자동 수정이 반영한 파일:
            ${{ steps.result.outputs.modified_files }}
            - Gemini 하네스가 수정 후 테스트를 다시 실행했습니다.

            ## Scope Check

            - [x] PR이 하나의 목적을 가진다
            - [x] 불필요한 변경이 포함되지 않았다

            ## 검증 방법 (How to test)

            실행한 테스트:

            - [ ] 빌드 테스트
            - [x] 테스트 스위트
            - [ ] 수동 확인

            테스트 명령:

            ```bash
            python3 -m pytest target-project/backend/tests/test_service.py target-project/backend/tests/test_api.py
            ```

            결과:

            - ${{ steps.result.outputs.summary }}

            ## 영향 범위 (Impact)

            - [ ] 기존 기능 영향 없음
            - [x] 일부 로직 변경 있음
            - [ ] UI/UX 변경 있음
            - [ ] API/데이터 구조 변경 있음

            설명:

            - backend bugfix 경로를 중심으로 자동 수정이 반영되었습니다.

            ## 설계 판단 / 고려 사항

            - 허용 파일 범위 안에서만 수정하도록 하네스가 제한했습니다.
            - 자세한 reasoning과 실행 로그는 workflow artifact를 참고해주세요.

            ## Known Limitations

            - 자동 생성 PR이므로 최종 머지 전 수동 리뷰가 필요합니다.
            - Gemini quota 상태에 따라 같은 이슈라도 재현 결과가 달라질 수 있습니다.

            ## 기본 규칙 체크

            - [ ] 하드코딩된 경로 없음
            - [x] debug print 없음
            - [ ] 함수가 과도하게 길지 않음
            - [ ] 한 파일 한 책임 원칙 유지
            - [ ] TypeScript 타입 안정성 확보

            ## TODO

            - 필요하면 artifact의 result.json / report.md를 바탕으로 추가 수동 검토를 진행해주세요.

      - name: Comment success on issue
        if: steps.result.outputs.success == 'true'
        uses: actions/github-script@v7
        env:
          PR_URL: ${{ steps.cpr.outputs.pull-request-url }}
          SUMMARY: ${{ steps.result.outputs.summary }}
        with:
          script: |
            const prUrl = process.env.PR_URL;
            const summary = process.env.SUMMARY || '자동 수정이 완료되었습니다.';
            const body = prUrl
              ? [
                  '자동 수정이 완료되어 PR을 만들었습니다.',
                  '',
                  '### 결과 요약',
                  summary,
                  '',
                  '### 생성된 PR',
                  `- ${prUrl}`,
                  '',
                  '필요하면 artifact에서 자세한 실행 로그를 확인해주세요.',
                ].join('\n')
              : [
                  '자동 수정은 성공했지만 커밋할 변경이 없어서 PR은 생성되지 않았습니다.',
                  '',
                  '### 결과 요약',
                  summary,
                  '',
                  'artifact에서 자세한 실행 로그를 확인해주세요.',
                ].join('\n');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });

      - name: Comment failure on issue
        if: steps.result.outputs.success != 'true'
        uses: actions/github-script@v7
        env:
          SUMMARY: ${{ steps.result.outputs.summary }}
          REPORT_EXCERPT: ${{ steps.result.outputs.report_excerpt }}
          NEXT_ACTION: ${{ steps.result.outputs.next_action }}
          EXIT_CODE: ${{ steps.harness.outputs.exit_code }}
        with:
          script: |
            const summary = process.env.SUMMARY || '자동 수정이 완료되지 않았습니다.';
            const reportExcerpt = (process.env.REPORT_EXCERPT || '').trim();
            const nextAction = process.env.NEXT_ACTION || 'artifact 로그를 확인한 뒤 다시 시도해주세요.';
            const exitCode = process.env.EXIT_CODE || '1';
            const lines = [
              '자동 수정이 완료되지 않았습니다.',
              '',
              '### 실패 이유',
              summary,
              '',
              '### 실행 상태',
              `- Exit code: ${exitCode}`,
              `- Workflow run: ${context.runId}`,
              '',
              '### 다음 액션',
              nextAction,
            ];
            if (reportExcerpt) {
              lines.push('', '### 로그 요약', '', '```text', reportExcerpt, '```');
            }
            lines.push('', '자세한 로그와 산출물은 workflow artifact를 확인해주세요.');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: lines.join('\n'),
            });
